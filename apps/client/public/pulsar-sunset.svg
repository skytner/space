<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="planet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="40%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <radialGradient id="sheen" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fecdd3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.05"/>
      <stop offset="30%" stop-color="#fb923c" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#fb923c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Ring behind -->
  <ellipse cx="256" cy="256" rx="220" ry="56" fill="none" stroke="url(#ring-grad)" stroke-width="5" transform="rotate(-20,256,256)" opacity="0.35"/>

  <!-- Planet body -->
  <circle cx="256" cy="256" r="120" fill="url(#planet)"/>
  <circle cx="256" cy="256" r="120" fill="url(#sheen)"/>

  <!-- Surface bands -->
  <ellipse cx="256" cy="200" rx="105" ry="15" fill="none" stroke="#fecdd3" stroke-width="2" opacity="0.18"/>
  <ellipse cx="256" cy="256" rx="118" ry="18" fill="none" stroke="#fecdd3" stroke-width="1.8" opacity="0.13"/>
  <ellipse cx="256" cy="300" rx="98" ry="13" fill="none" stroke="#fecdd3" stroke-width="1.5" opacity="0.1"/>

  <!-- Ring in front -->
  <ellipse cx="256" cy="256" rx="220" ry="56" fill="none" stroke="#fb923c" stroke-width="5" transform="rotate(-20,256,256)" opacity="0.1" stroke-dasharray="0 330 300 700"/>

  <!-- Moon -->
  <circle cx="420" cy="150" r="12" fill="#ffe4e6" opacity="0.6"/>
</svg>
